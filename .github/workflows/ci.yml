name: CI

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:ci@localhost:5432/postgres
      PAYLOAD_SECRET: ci-test-secret
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      CRON_SECRET: ci-cron-secret
      PREVIEW_SECRET: ci-preview-secret
      # Cloudflare's official always-pass Turnstile test keys
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Check generated types are up to date
        run: |
          pnpm generate:types
          git diff --exit-code src/payload-types.ts

      - name: Run database migrations
        run: pnpm migrate

      - name: Build
        run: pnpm build

      - name: Integration tests
        run: pnpm test:int

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: End-to-end tests
        run: pnpm test:e2e

  # Deployment is intentionally not wired up yet. Once hosting is provisioned
  # (see DEPLOYMENT.md), add a deploy job gated on the main branch, e.g.:
  #
  # deploy:
  #   needs: build
  #   if: github.ref == 'refs/heads/main'
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: superfly/flyctl-actions/setup-flyctl@master
  #     - run: flyctl deploy --remote-only
  #       env:
  #         FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
